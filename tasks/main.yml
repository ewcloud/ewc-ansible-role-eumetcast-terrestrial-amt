---
- name: Ensure client group exists
  ansible.builtin.group:
    name: "{{ linux_username }}"
    state: present

- name: Ensure client user exists
  ansible.builtin.user:
    name: "{{ linux_username }}"
    group: "{{ linux_username }}"
    groups:
      - sudo
    append: true
    shell: /bin/bash
    create_home: true
    comment: "{{ linux_username }} nologin User"
    state: present

- name: Download client archive
  ansible.builtin.get_url:
    url: "https://sftp.eumetsat.int/public/folder/uscvknvooksycdgpmimjnq/User-Materials/EUMETCast_Support/EUMETCast_Licence_cd/Linux/Tellicast/eum-ter-amt.tgz"
    dest: "/tmp/eum-ter-amt.tgz"
    mode: "0644"
    force: false

- name: Extract client archive
  ansible.builtin.unarchive:
    src: "/tmp/eum-ter-amt.tgz"
    dest: "/home/{{ linux_username }}"
    remote_src: true
    owner: "{{ linux_username }}"
    group: "{{ linux_username }}"
    creates: "/home/{{ linux_username }}/eumter-amt"

- name: Remove temporary archive file
  ansible.builtin.file:
    path: "/tmp/eum-ter-amt.tgz"
    state: absent

- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Gather package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Check enabled foreign architectures
  ansible.builtin.command:
    cmd: dpkg --print-foreign-architectures
  register: foreign_architectures
  changed_when: false

- name: Enable i386 architecture
  ansible.builtin.command:
    cmd: dpkg --add-architecture i386
  when: "'i386' not in foreign_architectures.stdout_lines"
  register: add_i386_architecture
  changed_when: add_i386_architecture.rc == 0

- name: Refresh apt cache after architecture change
  ansible.builtin.apt:
    update_cache: true
  when: "'i386' not in foreign_architectures.stdout_lines"

- name: Install Tellicast runtime dependencies
  ansible.builtin.apt:
    name:
      - libc6:i386
      - libncurses5:i386
      - libstdc++6:i386
      - iptables-persistent
    state: present
    update_cache: false

- name: Install AMT gateway package
  ansible.builtin.apt:
    deb: "/home/{{ linux_username }}/eumter-amt/packages/{{ amtgwd_deb }}"
    state: present
  when: "'amtgwd' not in ansible_facts.packages"

- name: Install Tellicast client package
  ansible.builtin.apt:
    deb: "/home/{{ linux_username }}/eumter-amt/packages/{{ tellicast_deb }}"
    state: present
  when: "'tellicast-client' not in ansible_facts.packages"
