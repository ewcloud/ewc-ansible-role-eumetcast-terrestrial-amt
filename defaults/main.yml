---
linux_username: eumetuser
tellicast_deb: tellicast-client-2.14.7-1_i386.deb
amtgwd_deb: amt_2.0-2_amd64.deb
tellicast_interface_address: "10.187.0.11"
tellicast_instance_start_order: "ter-1,ter-2,ter-3"
services:
  - ter-1
  - ter-2
  - ter-3
nat_destination_network: "193.17.9.3/28"
sysctl_parameters:
  - name: "net.core.rmem_default"
    value: "21299200"
  - name: "net.core.wmem_default"
    value: "21299200"
  - name: "net.core.rmem_max"
    value: "21292200"
  - name: "net.core.wmem_max"
    value: "21292200"
  - name: "net.core.netdev_max_backlog"
    value: "10000"
  - name: "net.ipv4.udp_rmem_min"
    value: "21292200"
  - name: "net.ipv4.udp_wmem_min"
    value: "21292200"
